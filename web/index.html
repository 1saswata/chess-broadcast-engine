<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectator</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
</head>
<body>
    <div id="board" style="width: 400px"></div>
    <script> 
        var config = {
            //draggable: true,
            position: 'start',
            // Point to the CDN-hosted image files
            pieceTheme: '/img/chesspieces/{piece}.png'
        };
        const board = Chessboard('board', config);
        var expectedSequence = 1;
        const pendingBuffer = new Map();
        const ws = new WebSocket("ws://localhost:8081/ws?match_id=1");
        ws.addEventListener('open', (event) => {
            console.log('Connected to server');
        });
        ws.addEventListener('message', (event) => {
            var data = JSON.parse(event.data);
            console.log(data);
            var moveSeq = data.startingSquare.toLowerCase() + '-' +
                data.destinationSquare .toLowerCase();
            if (data.sequenceNumber == expectedSequence) {
                board.move(moveSeq);
                expectedSequence++;
                while (pendingBuffer.has(expectedSequence)) {
                    board.move(pendingBuffer.get(expectedSequence));
                    expectedSequence++;
                }
            } else if (data.sequenceNumber > expectedSequence) {
                pendingBuffer.set(data.sequenceNumber, moveSeq);
            }
        });
        ws.addEventListener('error', (error) => {
            console.error('Websocket error: ', error);
        });

        
    </script>
</body>
</html>
